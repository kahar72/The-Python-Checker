name: IPTV Health Monitor

on:
  schedule:
    - cron: '0 */6 * * *' 
  workflow_dispatch:      

jobs:
  check-status:
    runs-on: ubuntu-latest
    steps:
      # Updated from @v4 to @v5 (or the latest stable version)
      - name: Checkout code
        uses: actions/checkout@v4 

      # Updated from @v4 to @v5
      - name: Set up Python
        uses: actions/setup-python@v5 
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run health check
        env:
          MY_DROPBOX_URL: ${{ secrets.MY_DROPBOX_URL }}
        run: python check_streams.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add STREAM_STATUS.md
          git commit -m "Update stream health report" || exit 0
          git push
