name: IPTV Health Monitor

on:
  schedule:
    - cron: '0 */6 * * *' # Runs every 6 hours
  workflow_dispatch:      # Allows you to click a button to run it manually

jobs:
  check-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run health check
        env:
          # This connects your GitHub Secret to the Python script
          MY_DROPBOX_URL: ${{ secrets.MY_DROPBOX_URL }}
        run: python check_streams.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add STREAM_STATUS.md
          git commit -m "Update stream health report" || exit 0
          git push
